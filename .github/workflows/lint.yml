name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  markdown-lint:
    name: markdownlint (warning only)
    runs-on: ubuntu-latest
    # 외부 PR 진입 장벽을 낮추기 위해 markdownlint 위반은 fail 시키지 않음.
    # 위반은 GitHub Actions 로그에 표시되며, 기여자가 참고용으로 볼 수 있다.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            **/*.md
            !node_modules/**
            !**/.git/**
          config: ".markdownlint.yml"

  pattern-table-format:
    name: pattern table format (must pass)
    runs-on: ubuntu-latest
    # 패턴 카탈로그 표 형식은 머지 위험이 가장 큰 영역이라 fail.
    steps:
      - uses: actions/checkout@v4

      - name: Validate pattern table columns
        run: bash scripts/lint-patterns.sh

  cross-file-sync:
    name: cross-file sync (must pass)
    runs-on: ubuntu-latest
    # SKILL.md / PROMPT.md / references/ko-ai-signals.md 의 정량 규칙(20% / 3곳)
    # 과 12 카테고리 키워드가 세 파일에서 sync 됐는지. 한 파일만 바뀌면 fail.
    steps:
      - uses: actions/checkout@v4

      - name: Validate quantitative rules and category sync
        run: bash scripts/lint-cross-file.sh

  examples-integrity:
    name: examples integrity (must pass)
    runs-on: ubuntu-latest
    # examples/ 가 SKILL 출력 포맷 룰("주요 변경 최대 5개") 과 카테고리 범위(1~12)
    # 를 따르는지. 예시 콘텐츠 PR 의 안전망.
    steps:
      - uses: actions/checkout@v4

      - name: Validate examples format and category range
        run: bash scripts/lint-examples.sh
